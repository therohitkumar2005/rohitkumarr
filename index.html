<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search across Netflix, Prime, Hotstar...">
    <button onclick="performSearch()">Search All</button>
</div>

<script>
async function performSearch() {
    const query = document.getElementById('searchInput').value;
    const loader = document.getElementById('loader');
    const list = document.getElementById('movieList');
    
    loader.style.display = 'block';
    list.innerHTML = '';

    try {
        // Ab hum type bhej hi nahi rahe, backend khud handle karega
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        loader.style.display = 'none';

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="ott-tag">${item.ott}</div>
                <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/180x260?text=No+Poster'">
                <div class="info">${item.title}</div>
            `;
            
            // Redirect with the OTT type stored in the result
            card.onclick = () => {
                window.location.href = `player.html?id=${item.id}&title=${encodeURIComponent(item.title)}&ott=${item.ott}`;
            };
            list.appendChild(card);
        });
    } catch (err) {
        loader.style.display = 'none';
        alert("Search failed!");
    }
}
</script>
