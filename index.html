<div id="player-container" style="display:none; margin-top:20px;">
    <video id="player" playsinline controls style="width:100%; max-width:800px; margin:0 auto;"></video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<script>
    const player = new Plyr('#player');

    async function playMovie(id, title) {
        const res = await fetch(`/api/links?id=${id}&title=${title}`);
        const sources = await res.json();
        
        if(sources.length > 0) {
            document.getElementById('player-container').style.display = 'block';
            const videoLink = sources[0].file;
            
            // HLS (m3u8) play karne ke liye
            if (videoLink.includes('.m3u8')) {
                alert("M3U8 link mila! Browser mein play karne ke liye HLS.js chahiye.");
                // Filhaal direct link console mein print kar rahe hain
                console.log("Video Link:", videoLink);
            }
        }
    }
</script>
