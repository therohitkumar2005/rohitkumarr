<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMirror Web - Back on Track</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root { --main-red: #e50914; --bg-black: #0f0f0f; --card-bg: #1f1f1f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-black); color: white; margin: 0; padding: 20px; text-align: center; }
        
        /* Search Bar Styling */
        .header-section { margin-bottom: 30px; }
        .search-box { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        input { padding: 12px 20px; width: 300px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main-red); box-shadow: 0 0 8px rgba(229, 9, 20, 0.5); }
        button { padding: 12px 30px; border-radius: 25px; border: none; background: var(--main-red); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #b20710; transform: scale(1.05); }

        /* Video Player Container */
        #player-wrapper { 
            max-width: 900px; margin: 0 auto 40px auto; display: none; 
            background: #000; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); border: 1px solid #333;
        }

        /* Results Grid */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 10px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .movie-card:hover { transform: translateY(-10px); box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; background: #333; }
        .movie-card .info { padding: 10px; font-size: 14px; font-weight: 500; height: 40px; overflow: hidden; text-overflow: ellipsis; }

        /* Loading Spinner */
        #loader { display: none; color: var(--main-red); margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>NetMirror <span style="color: var(--main-red);">Web Player</span></h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Movie ya Series ka naam likhein...">
            <button onclick="searchMovies()">Search</button>
        </div>
        <div id="loader">Processing... Ek pal rukiye...</div>
    </div>

    <div id="player-wrapper">
        <video id="videoPlayer" playsinline controls crossorigin></video>
    </div>

    <div class="results-grid" id="movieList"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        // Initialize Plyr Player
        const videoElement = document.getElementById('videoPlayer');
        const player = new Plyr(videoElement, {
            captions: { active: true, update: true, language: 'en' }
        });

        // Search Function
        async function searchMovies() {
            const query = document.getElementById('searchInput').value;
            if(!query) return alert("Bhai, kuch likho toh sahi!");

            const loader = document.getElementById('loader');
            const list = document.getElementById('movieList');
            
            loader.style.display = 'block';
            list.innerHTML = '';

            try {
                // Backend API call
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                loader.style.display = 'none';

                if(data.length === 0) {
                    list.innerHTML = "<p>Maaf kijiyega, kuch nahi mila.</p>";
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/160x240?text=No+Poster'">
                        <div class="info">${item.title}</div>
                    `;
                    card.onclick = () => loadVideo(item.id, item.title);
                    list.appendChild(card);
                });
            } catch (err) {
                loader.style.display = 'none';
                alert("Server se connection nahi ho pa raha!");
            }
        }

        // Load and Play Video
        async function loadVideo(id, title) {
            const playerWrapper = document.getElementById('player-wrapper');
            const loader = document.getElementById('loader');
            
            loader.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            try {
                // Get Video Links from API
                const res = await fetch(`/api/links?id=${id}&title=${encodeURIComponent(title)}`);
                const sources = await res.json();

                loader.style.display = 'none';

                if(!sources || sources.length === 0) {
                    alert("Afsos! Video link nahi mil paya.");
                    return;
                }

                playerWrapper.style.display = 'block';
                const m3u8Url = sources[0].file;

                // HLS Logic for Browser Support
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(m3u8Url);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        videoElement.play();
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    // For Safari support
                    videoElement.src = m3u8Url;
                    videoElement.play();
                }

            } catch (err) {
                loader.style.display = 'none';
                alert("Video play karne mein dikat aa rahi hai.");
            }
        }
    </script>
</body>
</html>
