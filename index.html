<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMirror Web - Back on Track</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { --red: #e50914; --black: #0f0f0f; --gray: #1f1f1f; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .highlight { color: var(--red); }

        /* Search & Filter Section */
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        select, input { padding: 12px 20px; border-radius: 30px; border: 1px solid #333; background: #222; color: white; font-size: 16px; outline: none; }
        input { width: 300px; }
        button { padding: 12px 35px; border-radius: 30px; border: none; background: var(--red); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b20710; transform: scale(1.05); }

        /* Video Player */
        #player-wrapper { max-width: 900px; margin: 20px auto; display: none; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* Results Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--gray); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card .title { padding: 10px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--red); padding: 2px 8px; font-size: 10px; border-radius: 5px; text-transform: uppercase; }

        #loading { margin: 20px; font-style: italic; color: #888; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>NetMirror <span class="highlight">Web Player</span></h1>

        <div class="controls">
            <select id="ottType">
                <option value="nf">Netflix Mirror</option>
                <option value="pv">Prime Video Mirror</option>
                <option value="hs">Hotstar Mirror</option>
                <option value="dp">Disney+ Mirror</option>
            </select>
            <input type="text" id="query" placeholder="Dhundiye movies ya shows...">
            <button onclick="search()">Search</button>
        </div>

        <div id="loading">Kam ho raha hai, rukiye...</div>

        <div id="player-wrapper">
            <video id="video" playsinline controls></video>
        </div>

        <div class="grid" id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const video = document.getElementById('video');
        const player = new Plyr(video);
        const loading = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');

        // 1. Search Logic
        async function search() {
            const q = document.getElementById('query').value;
            const ott = document.getElementById('ottType').value;
            if(!q) return;

            loading.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                // Call unified API
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=${ott}`);
                const data = await res.json();
                
                loading.style.display = 'none';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="badge">${ott}</span>
                        <img src="${item.image}" onerror="this.src='https://via.placeholder.com/160x230?text=No+Poster'">
                        <div class="title">${item.title}</div>
                    `;
                    card.onclick = () => playVideo(item.id, item.title, ott);
                    resultsDiv.appendChild(card);
                });
            } catch (err) {
                loading.style.display = 'none';
                alert("Search fail ho gaya!");
            }
        }

        // 2. Play Video Logic
        async function playVideo(id, title, ott) {
            loading.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            try {
                // Fetch links from backend
                const res = await fetch(`/api/links?id=${id}&title=${encodeURIComponent(title)}&ott=${ott}`);
                const sources = await res.json();
                loading.style.display = 'none';

                if(!sources || sources.length === 0) {
                    alert("Afsos! Link nahi mila.");
                    return;
                }

                document.getElementById('player-wrapper').style.display = 'block';
                const streamUrl = sources[0].file;

                // HLS.js to handle m3u8 streams in non-Safari browsers
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                }
                
                video.play();
            } catch (err) {
                loading.style.display = 'none';
                alert("Video player mein error aa gaya.");
            }
        }
    </script>
</body>
</html>
