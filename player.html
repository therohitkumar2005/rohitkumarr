<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMirror Player - Streaming Now</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body { 
            background: #000; color: #fff; margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif;
        }

        .player-wrapper { 
            width: 95%; max-width: 1100px; aspect-ratio: 16 / 9; 
            background: #111; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); position: relative;
        }

        .back-nav {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(229, 9, 20, 0.9); color: white; padding: 10px 20px;
            border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 14px;
        }

        .movie-info { margin-top: 25px; text-align: center; }
        h2 { font-size: 1.5rem; margin: 5px 0; letter-spacing: 0.5px; }
        .tag { color: #e50914; font-weight: bold; font-size: 12px; text-transform: uppercase; }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 5; flex-direction: column;
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top: 4px solid #e50914; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <a href="index.html" class="back-nav">← Back to Home</a>

    <div class="player-wrapper">
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p id="status-text">Fetching secure video links...</p>
        </div>
        
        <video id="videoPlayer" playsinline controls crossorigin></video>
    </div>

    <div class="movie-info">
        <div class="tag" id="platformDisplay">Mirror</div>
        <h2 id="titleDisplay">Movie Title</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const video = document.getElementById('videoPlayer');
        const overlay = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');

        // URL parameters
        const params = new URLSearchParams(window.location.search);
        const movieID = params.get('id');
        const movieTitle = params.get('title');
        const ottType = params.get('ott') || 'nf';

        // Update UI
        document.getElementById('titleDisplay').innerText = movieTitle || "Unknown";
        document.getElementById('platformDisplay').innerText = ottType.toUpperCase() + " MIRROR";

        // Initialize Plyr
        const player = new Plyr(video, {
            quality: { default: 1080, options: [1080, 720, 480] }
        });

        async function startPlayback() {
            if (!movieID || !movieTitle) {
                statusText.innerText = "Error: Invalid Movie Data";
                return;
            }

            try {
                // Fetch links from backend
                const response = await fetch(`/api/links?id=${movieID}&title=${encodeURIComponent(movieTitle)}&ott=${ottType}`);
                const sources = await response.json();

                // FIX: Check if sources exists and has items before reading
                if (!sources || !Array.isArray(sources) || sources.length === 0) {
                    statusText.innerText = "Error: Video link not found. The server might be busy.";
                    return;
                }

                overlay.style.display = 'none';
                const streamUrl = sources[0].file; // Safe access now

                // HLS logic
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        xhrSetup: function(xhr) { xhr.withCredentials = false; }
                    });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.play();
                }

            } catch (err) {
                statusText.innerText = "Connection error. Please refresh.";
                console.error("Playback Error:", err);
            }
        }

        startPlayback();
    </script>
</body>
</html>
